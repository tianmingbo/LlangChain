<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星语助手</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header class="toolbar">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#22d3ee" />
                  <stop offset="100%" stop-color="#0f766e" />
                </linearGradient>
              </defs>
              <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#logoGrad)" />
              <path d="M20 23h24v4H20zm0 9h16v4H20zm0 9h24v4H20z" fill="#ffffff" />
              <circle cx="45" cy="41" r="7" fill="#ffffff" opacity="0.95" />
              <path d="M43 41l2 2 4-4" stroke="#0f766e" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <div>
          <p class="eyebrow">Multi-Role Assistant</p>
          <h1>星语助手</h1>
          </div>
        </div>
        <div class="actions">
          <label>
            角色
            <select id="roleSelect"></select>
          </label>
          <button id="themeToggleBtn" type="button">深色模式</button>
          <button id="newSessionBtn" type="button">新会话</button>
        </div>
      </header>

      <section class="layout">
        <aside class="session-panel">
          <div class="session-topbar">
            <button id="toggleSessionPanelBtn" class="panel-toggle-btn" type="button" title="收起会话" aria-label="切换会话栏">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <defs>
                  <linearGradient id="beanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#22d3ee" />
                    <stop offset="100%" stop-color="#0f766e" />
                  </linearGradient>
                </defs>
                <path d="M6.5 12c0-3.5 2.6-6 5.9-6 2.7 0 5.1 1.8 5.1 4.5 0 2.1-1.3 3.6-3 4.5l.2.2c1.1.9 1.8 2 1.8 3.3 0 2.2-1.9 3.8-4.3 3.8-3.5 0-5.7-2.4-5.7-5.6v-4.7z" fill="url(#beanGrad)" />
                <circle cx="11" cy="11.2" r="0.9" fill="#ffffff" />
                <circle cx="14" cy="11.2" r="0.9" fill="#ffffff" />
              </svg>
            </button>
          </div>
          <div class="session-panel-header">
            <div class="session-title">会话列表</div>
            <input id="sessionSearchInput" class="session-search" type="text" placeholder="搜索会话名称或ID" />
          </div>
          <div id="sessionList" class="session-list"></div>
        </aside>
        <section id="chatWindow" class="chat-window"></section>
      </section>

      <form id="chatForm" class="chat-form">
        <textarea id="messageInput" rows="3" placeholder="输入消息，Enter 发送，Shift+Enter 换行" required></textarea>
        <button type="submit">发送</button>
      </form>
      <p class="hint">会话记录自动保存在 Redis，可在左侧随时切换和删除。</p>
    </main>

    <script src="./main.js" type="module"></script>
  </body>
</html>
